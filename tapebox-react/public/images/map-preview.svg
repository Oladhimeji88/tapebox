<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Delivery route map preview</title>
  <desc id="desc">A stylized map showing a drone delivery route from hub to a hard-to-reach destination.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>

  <!-- roads -->
  <g opacity="0.3" stroke="#cbd5e1" stroke-linecap="round">
    <path d="M20 80C130 100 180 40 280 62C360 80 460 150 620 128" stroke-width="10" fill="none"/>
    <path d="M40 260C170 240 240 280 340 240C420 208 500 228 620 206" stroke-width="12" fill="none"/>
    <path d="M180 18C176 112 210 178 248 246C278 296 282 354 280 392" stroke-width="8" fill="none"/>
    <path d="M430 10C418 84 430 168 468 230C500 280 530 338 536 392" stroke-width="7" fill="none"/>
  </g>

  <!-- route -->
  <path d="M118 284C190 250 252 220 318 194C390 166 470 132 542 92" fill="none" stroke="url(#route)" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 16"/>

  <!-- start pin -->
  <g transform="translate(110 282)" filter="url(#shadow)">
    <circle r="24" fill="#0ea5e9"/>
    <circle r="10" fill="#f8fafc"/>
    <text y="50" x="-30" fill="#e2e8f0" font-size="20" font-family="Outfit, Arial, sans-serif">Hub</text>
  </g>

  <!-- destination pin -->
  <g transform="translate(548 88)" filter="url(#shadow)">
    <circle r="26" fill="#f97316"/>
    <circle r="10" fill="#fff7ed"/>
    <text y="52" x="-98" fill="#fde68a" font-size="20" font-family="Outfit, Arial, sans-serif">Hard-to-reach</text>
  </g>

  <!-- small drone marker -->
  <g transform="translate(350 176)" filter="url(#shadow)">
    <rect x="-25" y="-8" width="50" height="16" rx="7" fill="#f8fafc"/>
    <line x1="-44" y1="-18" x2="-25" y2="-8" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <line x1="44" y1="-18" x2="25" y2="-8" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <line x1="-44" y1="18" x2="-25" y2="8" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <line x1="44" y1="18" x2="25" y2="8" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-47" cy="-20" r="6" fill="#fb923c"/>
    <circle cx="47" cy="-20" r="6" fill="#fb923c"/>
    <circle cx="-47" cy="20" r="6" fill="#fb923c"/>
    <circle cx="47" cy="20" r="6" fill="#fb923c"/>
  </g>
</svg>
